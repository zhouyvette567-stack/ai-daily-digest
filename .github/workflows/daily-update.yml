name: 每日 AI 资讯爬虫

# 每天 UTC 00:00（北京 time 08:00）运行
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:      # 支持手动触发

permissions:
  contents: write        # 需要写权限来提交更新的 JSON 文件

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📅 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 安装 Python 依赖
        run: |
          pip install -r requirements.txt

      - name: 🕷️ 运行爬虫
        run: python src/crawler.py
        env:
          TZ: Asia/Shanghai

      - name: 🏷️ 更新归档索引
        run: python src/gen_archive_index.py

      - name: 📤 提交并推送数据更新
        run: |
          git config user.name "ai-daily-bot"
          git config user.email "bot@ai-daily.github.io"
          git add data/
          if git diff --staged --quiet; then
            echo "没有内容变更，跳过提交"
          else
            git commit -m "chore: 每日更新 AI 资讯日报 $(date +'%Y-%m-%d')"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🌐 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./static
          # 如果 JSON 数据也在同一分支，需要同时保留 data 目录
          keep_files: true

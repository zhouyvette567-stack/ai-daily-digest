<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日 AI 资讯日报</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">✦</span>
                <span class="logo-text">AI 日报</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">今日</a>
                <a href="archive.html" class="nav-link">历史</a>
                <a href="about.html" class="nav-link">关于</a>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                <span class="theme-icon">🌙</span>
            </button>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 头部信息 -->
        <header class="daily-header">
            <div class="header-top">
                <h1 class="daily-title" id="dailyTitle">每日 AI 资讯日报</h1>
                <div class="live-badge" id="liveBadge">
                    <span class="live-dot"></span>
                    <span>实时更新</span>
                </div>
            </div>
            <div class="header-meta">
                <span class="date-display" id="dateDisplay">加载中...</span>
                <span class="separator">·</span>
                <span class="item-count" id="itemCount">-- 条资讯</span>
            </div>
            <p class="daily-desc">精选全球 AI 领域最新动态，技术前沿、学术论文、新产品、行业热点，每日 10 条，帮你快速把握 AI 脉搏。</p>
        </header>

        <!-- 分类统计 -->
        <div class="category-stats" id="categoryStats">
            <!-- 由 JS 动态生成 -->
        </div>

        <!-- 内容卡片列表 -->
        <section class="cards-section">
            <div class="cards-container" id="cardsContainer">
                <!-- 加载状态 -->
                <div class="loading-state" id="loadingState">
                    <div class="loading-spinner"></div>
                    <p>正在加载今日资讯...</p>
                </div>
            </div>
        </section>

        <!-- 底部 -->
        <footer class="daily-footer">
            <p>数据来源：GitHub Trending · arXiv · Hugging Face · Hacker News</p>
            <p>由 AI 自动抓取整理，每日自动更新</p>
        </footer>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
